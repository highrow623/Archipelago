item_mapping:
  Dream Breaker: breaker
  Sun Greaves:
    names:
      - kick
      - kick_or_plunge
    count: 3
    first_only: true
  Slide: slide
  Solar Wind: slide_jump
  Sunsetter:
    names:
      - plunge
      - kick_or_plunge
    first_only: true
  Strikebreak: strikebreak
  Cling Gem:
    names:
      - cling
    count: 6
    first_only: true
  Ascendant Light: light
  Soul Cutter: cutter
  Heliacal Power:
    names:
      - kick
      - kick_or_plunge
  Small Key: small_key
  Major Key - Empty Bailey:
    names:
      - major_key
    first_only: true
  Major Key - The Underbelly:
    names:
      - major_key
    first_only: true
  Major Key - Tower Remains:
    names:
      - major_key
    first_only: true
  Major Key - Sansa Keep:
    names:
      - major_key
    first_only: true
  Major Key - Twilight Theatre:
    names:
      - major_key
    first_only: true
  Progressive Slide:
    - slide
    - slide_jump
  Air Kick:
    names:
      - kick
      - kick_or_plunge
  Progressive Dream Breaker:
    - breaker
    - strikebreak
    - cutter
  Cling Shard:
    names:
      - cling
    count: 2

tags:
  - name: old_obscure
    advanced: At this level, all obscure tech in the previous format is expected
  - name: logic_level
    description: Old logic level.
    hard: Old hard.
    expert: Old expert.
    lunatic: old lunatic.

tag_groups: []

ref_rules:
  - name: can_slide_jump
    rule:
      has:
        - slide
        - slide_jump
  - name: can_gold_ultra
    rule:
      or:
        - has: slide
          options:
            game_version: full_gold
        - ref: can_slide_jump
  - name: can_gold_slide_ultra
    rule:
      options:
        game_version: map_patch
      has: slide
      # currently this rule is only applied for high enough logic, but should be refactored to include here
  - name: can_attack
    rule:
      or:
        - has: breaker
        - has: plunge
          tags:
            old_obscure: 1
  - name: can_strikebreak
    rule:
      has:
        - breaker
        - strikebreak
  - name: can_soul_cutter
    rule:
      has:
        - breaker
        - strikebreak
        - cutter
  - name: can_bounce
    rule:
      has:
        - breaker
        - light
  - name: can_unlock_door
    rule:
      and:
        - ref: can_attack
        - or:
            - has:
                small_key: 7
            - has:
                small_key: 6
              tags:
                logic_level: 2
  - name: can_enter_dark_rooms
    rule:
      or:
        - has: light
        - has: breaker
          tags:
            old_obscure: 1
        - tags:
            logic_level: 3
  - name: can_get_cling_gem
    rule:
      or:
        - has:
            kick_or_plunge: 2 # climb the right tower and cross
        - has:
            cling: 2
          tags:
            logic_level: 2
        - has: slide
          tags:
            logic_level: 3

regions:
  - name: Dungeon Mirror
    exits:
      - region: Dungeon Slide
        rule:
          ref: can_attack
  - name: Dungeon Slide
    exits:
      - region: Dungeon Mirror
        rule:
          ref: can_attack
      - region: Dungeon Strong Eyes
        rule:
          has: slide
      - region: Dungeon Escape Lower
        rule:
          or:
            - and:
                - ref: can_attack
                - ref: can_enter_dark_rooms
              tags:
                old_obscure: 1
            - has: breaker
              options:
                spawn_point: dungeon_mirror
  - name: Dungeon Strong Eyes
    exits:
      - region: Dungeon Slide
        rule:
          has: slide
      - region: Dungeon => Castle
        rule:
          or:
            - ref: can_unlock_door
            - or:
                - ref: can_bounce
                - and:
                    - ref: can_attack
                    - has:
                        kick: 2
                - and:
                    - ref: can_attack
                    - has:
                        cling: 2
                - has: plunge
                  tags:
                    logic_level: 2
                - has:
                    - breaker
                    - kick
                  tags:
                    logic_level: 2
                - and:
                    - has: breaker
                    - ref: can_slide_jump
                  tags:
                    logic_level: 2
                - and:
                    - ref: can_attack
                    - has: slide
                  tags:
                    logic_level: 3
              tags:
                old_obscure: 1
              options:
                game_version: map_patch
  - name: Dungeon => Castle
    exits:
      - region: Dungeon Mirror
      - region: Dungeon Strong Eyes
        rule:
          or:
            - ref: can_unlock_door
            - or:
                - has: plunge
                - has:
                    - breaker
                    - kick
                - has:
                    breaker: 1
                    cling: 2
                  tags:
                    logic_level: 2
                - has:
                    - breaker
                    - slide
                  tags:
                    logic_level: 3
              tags:
                old_obscure: 1
              options:
                game_version: map_patch
      - region: Castle Main
        # entrance_name: Dungeon Top Exit
  - name: Dungeon Escape Lower
    exits:
      - region: Dungeon Slide
        rule:
          ref: can_attack
      - region: Dungeon Escape Upper
        rule:
          or:
            - ref: can_bounce
            - has:
                - kick
                - plunge
            - has:
                kick: 3
            - has:
                cling: 4
              tags:
                logic_level: 2
            - has:
                kick_or_plunge: 2
              tags:
                logic_level: 2
            - and:
                - ref: can_gold_ultra
                - has: kick
              tags:
                logic_level: 3
            - and:
                - ref: can_gold_ultra
                - has: plunge
              tags:
                logic_level: 4
      - region: Underbelly => Dungeon
  - name: Dungeon Escape Upper
    exits:
      - region: Dungeon Escape Lower
      - region: Theatre Outside Scythe Corridor
        rule:
          or:
            - ref: can_bounce
            - has: kick
            - has:
                cling: 2
            - has: plunge
              tags:
                old_obscure: 1
            - has: slide
              tags:
                logic_level: 3

  - name: Castle Main
    exits:
      - region: Dungeon => Castle
      - region: Keep Main
      - region: Bailey Lower
      - region: Library Main
        rule:
          ref: can_attack
      - region: Castle => Theatre Pillar
        rule:
          or:
            - has:
                cling: 2
                kick_or_plunge: 1
            - has:
                kick_or_plunge: 2
            - has:
                cling: 2
              tags:
                logic_level: 2
            - has: kick
              tags:
                logic_level: 2
            - has: slide
              tags:
                logic_level: 3
            - has: plunge
              tags:
                logic_level: 4
      - region: Castle Spiral Climb
        rule:
          or:
            - has:
                kick: 2
            - has:
                cling: 2
                plunge: 1
            - has:
                cling: 2
              tags:
                logic_level: 2
            - has:
                kick_or_plunge: 2
              tags:
                logic_level: 2
            - and:
                - ref: can_slide_jump
                - has: plunge
              tags:
                logic_level: 2
            - ref: can_gold_ultra
              tags:
                logic_level: 3
            - has:
                - slide
                - kick_or_plunge
              tags:
                logic_level: 3
      - region: Keep (Northeast) => Castle
        rule:
          or:
            - ref: can_attack
            - tags:
                old_obscure: 1
  - name: Castle Spiral Climb
    exits:
      - region: Castle Main
      - region: Castle High Climb
        rule:
          or:
            - has:
                cling: 2
            - has:
                kick: 3
                plunge: 1
            - and:
                - ref: can_attack
                - has: kick
            - has:
                kick_or_plunge: 3
              tags:
                logic_level: 2
            - and:
                - ref: can_attack
                - ref: can_slide_jump
              tags:
                logic_level: 2
                old_obscure: 1
            - ref: can_gold_slide_ultra
              tags:
                logic_level: 3
            - has:
                - slide
                - kick_or_plunge
              tags:
                logic_level: 3
            - has:
                kick: 2
              tags:
                logic_level: 3
      - region: Castle By Scythe Corridor
        rule:
          or:
            - has:
                cling: 2
            - has:
                kick_or_plunge: 4
              tags:
                logic_level: 3
            - has:
                kick: 3
              tags:
                logic_level: 4
  - name: Castle High Climb
  - name: Castle By Scythe Corridor
    exits:
      - region: Castle Spiral Climb
        rule:
          or:
            - has:
                cling: 2
            - has:
                kick: 4
                plunge: 1
            - has:
                kick: 3
              tags:
                logic_level: 2
      - region: Castle High Climb
        rule:
          or:
            - has:
                cling: 2
            - has:
                kick: 4
            - has:
                kick: 2
                plunge: 1
            - and:
                - has:
                    - kick
                    - plunge
                - ref: can_slide_jump
            - has:
                kick: 3
                breaker: 1
              tags:
                logic_level: 2
            - has:
                - kick
                - plunge
              tags:
                logic_level: 2
            - has: slide
              tags:
                logic_level: 3
            - has:
                kick_or_plunge: 2
              tags:
                logic_level: 3
      - region: Castle => Theatre (Front)
        rule:
          or:
            - has:
                cling: 4
                kick_or_plunge: 2
            - has:
                cling: 6
              tags:
                logic_level: 2
            - and:
                - ref: can_gold_ultra
                - has:
                    kick: 2
              tags:
                logic_level: 3
            - has:
                slide: 1
                kick_or_plunge: 3
              tags:
                logic_level: 3
            - and:
                - ref: can_gold_ultra
                - has:
                    kick_or_plunge: 2
              tags:
                logic_level: 4
  - name: Castle => Theatre (Front)
    exits:
      - region: Castle By Scythe Corridor
        rule:
          or:
            - has:
                cling: 2
            - and:
                - ref: can_slide_jump
                - has: kick
            - has:
                kick: 4
            - ref: can_gold_slide_ultra
              tags:
                logic_level: 3
            - has:
                - slide
                - kick
              tags:
                logic_level: 3
            - has:
                kick: 3
              tags:
                logic_level: 3
            - ref: can_slide_jump
              tags:
                logic_level: 4
      - region: Castle Moon Room
        rule:
          or:
            - has:
                cling: 2
            - and:
                - ref: can_slide_jump
                - has:
                    kick_or_plunge: 2
            - has:
                kick: 4
              tags:
                logic_level: 2
            - has: slide
              tags:
                logic_level: 3
      - region: Theatre Main
        rule:
          or:
            - has:
                kick_or_plunge: 2
            - has:
                cling: 4 # TODO double check for hard logic
              tags:
                logic_level: 2
            - ref: can_gold_slide_ultra
              tags:
                logic_level: 3
            - has:
                - slide
                - kick_or_plunge
              tags:
                logic_level: 3
  - name: Castle Moon Room

  - name: Library Main
    exits:
      - region: Library Locked
        rule:
          ref: can_unlock_door
      - region: Library Greaves
        rule:
          has: slide
      - region: Library Top
        rule:
          or:
            - has:
                kick_or_plunge: 4
            - has:
                - kick
                - plunge
              tags:
                old_obscure: 1
            - has:
                cling: 4
              tags:
                logic_level: 2
            - has:
                kick_or_plunge: 2
              tags:
                logic_level: 2
                old_obscure: 1
            - has: plunge
              tags:
                logic_level: 3
            - has: slide
              tags:
                logic_level: 3
            - has: kick
              tags:
                logic_level: 4
            - has:
                cling: 2
              tags:
                logic_level: 4
      - region: Castle Main
        rule:
          ref: can_attack
  - name: Library Locked
  - name: Library Greaves
    exits:
      - region: Library Back
        rule:
          and:
            - ref: can_attack
            - or:
                - has:
                    cling: 2
                - has:
                    kick: 2
                - has: kick
                  tags:
                    logic_level: 2
                - has: slide
                  tags:
                    logic_level: 3
  - name: Library Top
    exits:
      - region: Library Back
        rule:
          or:
            - has:
                cling: 2
                kick_or_plunge: 1
            - has:
                kick: 3
                plunge: 1
            - and:
                - has:
                    kick: 3
                - ref: can_bounce
            - has:
                cling: 2
              tags:
                logic_level: 2
            - has:
                kick: 3
              tags:
                logic_level: 2
            - and:
                - has:
                    kick: 2
                    plunge: 1
                - ref: can_bounce
              tags:
                logic_level: 2
            - has:
                kick: 2
              tags:
                logic_level: 3
            - and:
                - ref: can_bounce
                - has:
                    - kick
                    - plunge
              tags:
                logic_level: 4
  - name: Library Back
    exits:
      - region: Library Greaves
        rule:
          and:
            - ref: can_attack
            - or:
                - has:
                    cling: 2
                - has:
                    kick: 1
      - region: Library Top
        rule:
          or:
            - has:
                cling: 4
            - has:
                kick: 2
            - has: kick
              tags:
                logic_level: 2
            - has:
                cling: 2
              tags:
                logic_level: 2
            - has: slide
              tags:
                logic_level: 2

  - name: Keep Main
    exits:
      - region: Keep Locked Room
        rule:
          or:
            - ref: can_unlock_door
            - has:
                kick: 3
            - has:
                - plunge
                - kick
            - has:
                cling: 2
                plunge: 1
            - has:
                cling: 2
                kick: 1
            - tags:
                logic_level: 2
        # Note for trackers: This is accessible with nothing but not in logic.
        # Cutting the platform or hitting the lever make this harder and are irreversible.
        # On Hard and above, the player is expected to not do either.
      - region: Keep Sunsetter
        rule:
          or:
            - has:
                cling: 2
                # See "Keep Main -> Keep Locked Room".
                # All other methods would go through Keep Locked Room instead.
            - tags:
                logic_level: 2
      - region: Keep Throne Room
        rule:
          or:
            - and:
                - has:
                    breaker: 1
                    cling: 6
                - or:
                    - has:
                        - plunge
                        - kick
                    - has:
                        plunge: 1
                        light: 1
                    - has:
                        kick: 1
                        light: 1
            - and:
                - ref: can_bounce
                - has:
                    kick_or_plunge: 4
            - and:
                - has:
                    breaker: 1
                    cling: 6
                - or:
                    - has: plunge
                    - has:
                        kick: 2
                    - has: kick
                      tags:
                        old_obscure: 1
              tags:
                logic_level: 2
            - has:
                breaker: 1
                plunge: 1
                kick: 4
              tags:
                logic_level: 2
            - and:
                - ref: can_bounce
                - has:
                    kick: 3
              tags:
                logic_level: 2
            - has:
                breaker: 1
                cling: 4
              tags:
                logic_level: 3
            - has:
                breaker: 1
                cling: 2
                kick: 1
              tags:
                logic_level: 3
            - has:
                breaker: 1
                cling: 2
                slide: 1
              tags:
                logic_level: 3
            - and:
                - has:
                    kick_or_plunge: 3
                - ref: can_bounce
              tags:
                logic_level: 3
            - has:
                breaker: 1
                slide: 1
                kick: 3
              tags:
                logic_level: 3
            - has:
                breaker: 1
                slide: 1
                kick: 2
                plunge: 1
              tags:
                logic_level: 4
            - has:
                breaker: 1
                cling: 2
              tags:
                logic_level: 3
            - and:
                - ref: can_gold_ultra
                - ref: can_bounce
                - ref: can_soul_cutter
                - has:
                    - kick
                    - plunge
              tags:
                logic_level: 3
      - region: Keep => Underbelly
        rule:
          or:
            - has: kick_or_plunge
            - has:
                cling: 2
            - has: slide
              tags:
                logic_level: 3
      - region: Theatre Outside Scythe Corridor
        rule:
          or:
            - has:
                cling: 2
            - has: kick
            - ref: can_bounce
            - ref: can_slide_jump
            - has: plunge
              tags:
                old_obscure: 1
            - has: slide
              tags:
                logic_level: 3
      - region: Keep (Northeast) => Castle
        rule:
          or:
            - has:
                cling: 2
            - has:
                kick: 2
            - has: plunge
            - has: kick
              tags:
                logic_level: 2
            - has: slide
              tags:
                logic_level: 3
      - region: Castle Main
  - name: Keep Locked Room
    exits:
      - region: Keep Sunsetter
  - name: Keep Sunsetter
  - name: Keep Throne Room
  - name: Keep => Underbelly
    exits:
      - region: Keep Main
      - region: Underbelly => Keep
  - name: Keep (Northeast) => Castle
    exits:
      - region: Keep Main
      - region: Castle Main # TODO: this doesn't really matter right now but is a little questionable for normal

  - name: Bailey Lower
    exits:
      - region: Bailey Upper
        rule:
          or:
            - and:
                - has: slide
                - ref: can_attack
            - has:
                kick: 2
            - has: kick
              tags:
                old_obscure: 1
            - has: plunge
              tags:
                logic_level: 2
            - has:
                cling: 2
              tags:
                logic_level: 2
            - has: slide
              tags:
                logic_level: 3
            - ref: can_bounce
              tags:
                logic_level: 4
      - region: Castle Main
      - region: Theatre Pillar => Bailey
  - name: Bailey Upper
    exits:
      - region: Bailey Lower
      - region: Underbelly => Bailey
        rule:
          has: plunge
      - region: Tower Remains
        rule:
          or:
            - and:
                - or:
                    - has:
                        kick_or_plunge: 4
                    - and:
                        - has:
                            - kick
                            - plunge
                        - ref: can_bounce
                      options:
                        game_version: map_patch
                - or: # get onto the bridge
                    - ref: can_slide_jump
                    - has: plunge
                      tags:
                        old_obscure: 1
            - has:
                kick_or_plunge: 3
              tags:
                logic_level: 2
            - and:
                - has:
                    kick: 2
                - ref: can_bounce
              tags:
                logic_level: 2
              options:
                game_version: map_patch
            - and:
                - has: slide
                - or:
                    - ref: can_bounce
                    - has: kick
                    - has:
                        cling: 2
                    - options:
                        game_version: full_gold
              tags:
                logic_level: 3
            - and:
                - ref: can_slide_jump
                - has: plunge
              tags:
                logic_level: 4
              options:
                game_version: map_patch

  - name: Tower Remains
    exits:
      - region: The Great Door
        rule:
          or:
            - and:
                - ref: can_attack
                - has:
                    cling: 2
                    kick_or_plunge: 1
            - and:
                - ref: can_attack
                - has:
                    cling: 2
              tags:
                logic_level: 2
            - has:
                slide: 1
                cling: 2
              tags:
                logic_level: 3
            - has:
                slide: 1
                kick: 2
              tags:
                logic_level: 3
            - and:
                - ref: can_gold_ultra
                - has:
                    - kick
                    - plunge
              tags:
                logic_level: 3
            - and:
                - ref: can_gold_ultra
                - has: kick
              tags:
                logic_level: 4
            - has:
                - slide
                - kick
                - plunge
              tags:
                logic_level: 4
            - has:
                plunge: 1
                kick: 2
              tags:
                logic_level: 4

  - name: Underbelly => Dungeon
    exits:
      - region: Dungeon Escape Lower
        rule:
          ref: can_enter_dark_rooms
      - region: Underbelly Light Pillar
      - region: Underbelly Ascendant Light
        rule:
          or:
            - ref: can_bounce
            - has:
                cling: 2
                kick: 1
            - has:
                kick: 2
            - and:
                - ref: can_slide_jump
                - has: kick
            - ref: can_attack
              tags:
                old_obscure: 1
            - has:
                cling: 2
              tags:
                logic_level: 2
            - has:
                - kick
                - slide
              tags:
                logic_level: 3
  - name: Underbelly Light Pillar
    exits:
      - region: Underbelly Main Upper
      - region: Underbelly => Dungeon
        rule:
          or:
            - ref: can_bounce
            - has:
                kick_or_plunge: 4
            - has:
                slide: 1
                kick: 2
              tags:
                logic_level: 3
            - and:
                - ref: can_gold_ultra
                - has:
                    - kick
                    - plunge
              tags:
                logic_level: 3
            - has:
                plunge: 1
                kick: 2
              tags:
                logic_level: 3
      - region: Underbelly Ascendant Light
        # this route is more difficult with ascendant light because of the long room with the switches, but
        # since it's possible to use AL to go up the pillar and get to the item that way (i.e. passing through
        # Underbelly => Dungeon), the logic for this entrance is written assuming the player doesn't have AL
        rule:
          or:
            - has:
                - breaker
                - plunge
            - has:
                breaker: 1
                kick: 3
              tags:
                old_obscure: 1
            - and:
                - ref: can_attack
                - has:
                    kick: 2
              tags:
                logic_level: 2
                old_obscure: 1
            - has:
                plunge: 1
                cling: 2
              tags:
                logic_level: 2
                old_obscure: 1
            - has:
                - plunge
                - kick
              tags:
                logic_level: 3
            - and:
                - ref: can_attack
                - has: slide
              tags:
                logic_level: 3
            - and:
                - ref: can_gold_ultra
                - has:
                    kick: 3
                    cling: 4
              tags:
                logic_level: 3
  - name: Underbelly Ascendant Light
    exits:
      - region: Underbelly => Dungeon
        rule:
          or:
            - ref: can_bounce
            - has:
                cling: 2
            - has:
                kick: 2
            - and:
                - has: kick
                - ref: can_slide_jump
            - has:
                - kick
                - slide
              tags:
                logic_level: 3
            - has:
                - kick
                - plunge
              tags:
                logic_level: 3
  - name: Underbelly Main Lower
    exits:
      - region: Underbelly => Bailey
      - region: Underbelly Hole
        rule:
          or:
            - and:
                - has: plunge
                - or:
                    - has: kick
                    - ref: can_slide_jump
                    - ref: can_attack
            - has:
                plunge: 1
                cling: 4
              tags:
                logic_level: 2
      - region: Underbelly By Heliacal
        rule:
          or:
            - has:
                - slide
                - plunge
            - has:
                slide: 1
                kick: 2
              tags:
                logic_level: 2
            - has: slide
              tags:
                logic_level: 3
      - region: Underbelly Main Upper
        rule:
          or:
            - has:
                plunge: 1
                kick: 2
            - has:
                plunge: 1
                kick: 1
              tags:
